<svg width="200" height="140" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="140" fill="#0a0a0a"/>

  <!-- Document -->
  <rect x="25" y="15" width="150" height="110" rx="4" fill="#1a1a1a" stroke="#6366f1" stroke-width="1.5"/>

  <!-- Seal/stamp -->
  <circle cx="55" cy="40" r="18" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.5"/>
  <circle cx="55" cy="40" r="12" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.5"/>
  <text x="55" y="43" font-family="Arial, sans-serif" font-size="7" fill="#6366f1" text-anchor="middle" opacity="0.5">SEAL</text>

  <!-- Header -->
  <text x="125" y="30" font-family="Arial, sans-serif" font-size="11" fill="#6366f1" text-anchor="middle" font-weight="bold">CERTIFICATE</text>
  <text x="125" y="43" font-family="Arial, sans-serif" font-size="8" fill="#6366f1" text-anchor="middle">OF</text>
  <text x="125" y="55" font-family="Arial, sans-serif" font-size="11" fill="#6366f1" text-anchor="middle" font-weight="bold">INCORPORATION</text>

  <!-- Content lines -->
  <rect x="35" y="70" width="130" height="3" rx="1.5" fill="#4a4a4a"/>
  <rect x="35" y="78" width="120" height="3" rx="1.5" fill="#4a4a4a"/>
  <rect x="35" y="86" width="110" height="3" rx="1.5" fill="#4a4a4a"/>
  <rect x="35" y="94" width="105" height="3" rx="1.5" fill="#4a4a4a"/>
  <rect x="35" y="102" width="95" height="3" rx="1.5" fill="#4a4a4a"/>

  <!-- Signature line -->
  <line x1="35" y1="118" x2="95" y2="118" stroke="#6366f1" stroke-width="1" opacity="0.5"/>
  <text x="65" y="125" font-family="Arial, sans-serif" font-size="7" fill="#6366f1" text-anchor="middle" opacity="0.5">Signature</text>
</svg>