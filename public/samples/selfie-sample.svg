<svg width="200" height="140" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="140" fill="#0a0a0a"/>

  <!-- Person outline (head) -->
  <circle cx="70" cy="55" r="25" fill="#1a1a1a" stroke="#6366f1" stroke-width="1.5"/>
  <circle cx="63" cy="50" r="3" fill="#6366f1"/>
  <circle cx="77" cy="50" r="3" fill="#6366f1"/>
  <path d="M 60 63 Q 70 68 80 63" stroke="#6366f1" stroke-width="1.5" fill="none"/>

  <!-- Shoulders -->
  <path d="M 45 80 L 50 105 L 90 105 L 95 80" fill="#1a1a1a" stroke="#6366f1" stroke-width="1.5"/>

  <!-- Hand holding ID -->
  <rect x="105" y="50" width="70" height="50" rx="3" fill="#2a2a2a" stroke="#6366f1" stroke-width="1.5"/>

  <!-- ID details -->
  <rect x="112" y="57" width="18" height="24" rx="2" fill="#1a1a1a"/>
  <rect x="135" y="60" width="35" height="2" rx="1" fill="#4a4a4a"/>
  <rect x="135" y="66" width="28" height="2" rx="1" fill="#4a4a4a"/>
  <rect x="135" y="72" width="32" height="2" rx="1" fill="#4a4a4a"/>
  <rect x="135" y="78" width="25" height="2" rx="1" fill="#4a4a4a"/>

  <!-- Paper with date -->
  <rect x="115" y="105" width="50" height="25" rx="2" fill="#2a2a2a" stroke="#4a4a4a" stroke-width="1"/>
  <text x="140" y="120" font-family="Arial, sans-serif" font-size="9" fill="#6366f1" text-anchor="middle">DATE</text>
</svg>